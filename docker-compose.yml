services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-portfolio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-portfolio}
      POSTGRES_DB: ${POSTGRES_DB:-portfolio}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-portfolio} -d ${POSTGRES_DB:-portfolio}"]
      interval: 5s
      timeout: 3s
      retries: 20

  ingestion:
    build: ./services/ingestion
    environment:
      KAGGLE_USERNAME: ${KAGGLE_USERNAME}
      KAGGLE_KEY: ${KAGGLE_KEY}
      DATA_DIR: /data
    volumes:
      - data:/data
    depends_on:
      postgres:
        condition: service_healthy

  processing:
    build: ./services/processing
    environment:
      DATA_DIR: /data
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-portfolio}
      POSTGRES_USER: ${POSTGRES_USER:-portfolio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-portfolio}
    volumes:
      - data:/data
    depends_on:
      postgres:
        condition: service_healthy

  aggregation:
    build: ./services/aggregation
    environment:
      DATA_DIR: /data
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-portfolio}
      POSTGRES_USER: ${POSTGRES_USER:-portfolio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-portfolio}
    volumes:
      - data:/data
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  data: